name: Publish to siakhooi.github.io/apt

on:
  workflow_call:
    secrets:
      PUBLISH_TO_GITHUB_REPO_TOKEN:
        required: true

jobs:
  publish_apt:
    name: publish to apt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deliverables
          path: ./

      - uses: siakhooi/publish-to-repo-action@b77be1a441a17461b0ebe7796afa96f903c9ee5c # v0.5.0
        with:
          token: ${{ secrets.PUBLISH_TO_GITHUB_REPO_TOKEN }}
          config-file: publish-to-apt.yml
