name: Publish to siakhooi.github.io/apt

on:
  workflow_call:
    secrets:
      PUBLISH_TO_GITHUB_REPO_TOKEN:
        required: true

jobs:
  publish_apt:
    name: publish to apt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deliverables
          path: ./

      - uses: siakhooi/publish-to-repo-action@271e25cc35003995ea07bf1abf730289179b4eb5 # v0.6.0
        with:
          token: ${{ secrets.PUBLISH_TO_GITHUB_REPO_TOKEN }}
          config-file: publish-to-apt.yml
